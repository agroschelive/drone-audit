[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "drone-audit"
version = "0.2.0-alpha"
description = "Experimental auxiliary analysis tool for exported DJI Agras operation files."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-only" }
authors = [{ name = "Italo Schelive Correia", email = "agroschelive@gmail.com" }]
dependencies = [
  "pandas>=2.0",
  "pyproj>=3.6",
  "folium>=0.16",
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
drone-audit = "drone_audit.cli:main"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
