name: Feature request
description: Suggest an improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the suggested solution.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy/security considerations
      description: Mention any data, coordinates, telemetry, or identity risks.
